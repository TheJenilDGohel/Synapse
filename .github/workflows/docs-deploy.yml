name: Deploy Documentation

on:
  push:
    branches: [ main ]
    paths:
      - 'docs/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Dart
        uses: dart-lang/setup-dart@v1

      - name: Install Jaspr CLI
        run: dart pub global activate jaspr_cli

      - name: Build Docs
        working-directory: docs
        run: |
          dart pub get
          dart pub global run jaspr_cli:jaspr build --dart-define=SITE_BASE_PATH=/Synapse

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: docs/build/jaspr
          branch: gh-pages
