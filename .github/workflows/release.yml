name: Release

# Auto-publish to npm AND create GitHub release when package.json version
# changes on main or release/* branches.
#
# SAFETY GUARDS (in execution order):
#  1. Only triggers on pushes to main/release/* (NOT on PRs, NOT on tags)
#  2. Only fires when package.json was modified in the push
#  3. Skips if version hasn't changed vs previous commit
#  4. Fails if version already exists on npm registry
#  5. Runs full quality pipeline before publishing
#  6. Verifies pack tarball is sane (file count + critical files)
#  7. Uses npm OIDC trusted publishing for provenance attestation
#  8. Auto-detects @beta/@alpha/@next/@latest tag from version string
#  9. Concurrency lock prevents overlapping publishes
# 10. Optional npm-publish environment for manual approval gate
# 11. GitHub release created ONLY after npm publish succeeds
#
# AUTHENTICATION:
#  Uses OIDC trusted publishing (no secrets required).
#  Configure at: https://www.npmjs.com/package/synapse/access
#  Fallback: Set NPM_TOKEN secret if OIDC is not yet configured.

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - 'release/**'
    paths:
      - 'package.json'

permissions:
  contents: write
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Publish to npm + GitHub Release
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: npm-publish
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 2

      - name: Setup Node
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6
        with:
          node-version: 22
          cache: npm
          registry-url: 'https://registry.npmjs.org'
          always-auth: true

      - name: Preflight — verify NODE_AUTH_TOKEN secret is set
        id: auth_check
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NODE_AUTH_TOKEN }}
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "::warning::NODE_AUTH_TOKEN secret is not set. Skipping npm publish."
            echo "::warning::Fix: Settings → Environments → npm-publish → Add secret NODE_AUTH_TOKEN."
            echo "has_token=false" >> "$GITHUB_OUTPUT"
          else
            echo "NODE_AUTH_TOKEN is present"
            echo "has_token=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Preflight — verify token has publish rights (npm whoami)
        if: steps.auth_check.outputs.has_token == 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NODE_AUTH_TOKEN }}
        run: |
          if ! WHOAMI=$(npm whoami 2>&1); then
            echo "::error::npm whoami failed — NODE_AUTH_TOKEN is invalid, expired, or revoked."
            exit 1
          fi
          echo "npm whoami succeeded: $WHOAMI"
          if ! npm access list packages 2>&1 | grep -q "synapse-cortex"; then
            echo "::warning::npm access list did not include synapse-cortex — token may not be scoped for publishing this package. Continuing anyway."
          fi

      - name: Read local version
        id: local
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Read previous version
        id: previous
        run: |
          PREV=$(git show HEAD~1:package.json 2>/dev/null | node -p "JSON.parse(require('fs').readFileSync(0, 'utf8')).version" 2>/dev/null || echo "none")
          echo "version=$PREV" >> "$GITHUB_OUTPUT"

      - name: Check if version changed
        id: changed
        run: |
          if [ "${{ steps.local.outputs.version }}" = "${{ steps.previous.outputs.version }}" ]; then
            echo "Version unchanged (${{ steps.local.outputs.version }}) — skipping release"
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          else
            echo "Version changed: ${{ steps.previous.outputs.version }} -> ${{ steps.local.outputs.version }}"
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Check npm registry for collision
        if: steps.changed.outputs.should_release == 'true'
        run: |
          PKG=$(node -p "require('./package.json').name")
          VER=${{ steps.local.outputs.version }}
          if npm view "$PKG@$VER" version 2>/dev/null; then
            echo "::error::Version $VER already exists on npm registry. Bump version before merging."
            exit 1
          fi
          echo "Version $VER is available on npm registry"

      - name: Install dependencies
        if: steps.changed.outputs.should_release == 'true'
        run: npm ci

      - name: Run quality pipeline
        if: steps.changed.outputs.should_release == 'true'
        run: npm run quality

      - name: Verify pack tarball
        if: steps.changed.outputs.should_release == 'true'
        run: |
          npm pack --dry-run > pack-output.txt 2>&1
          FILE_COUNT=$(grep -c "^npm notice" pack-output.txt || echo 0)
          if [ "$FILE_COUNT" -lt 50 ]; then
            echo "::error::Tarball has only $FILE_COUNT files — expected 100+. Check .npmignore and package.json files field."
            cat pack-output.txt
            exit 1
          fi
          for required in "bin/synapse.js" "bin/synapse.cjs" "src/interfaces/app/mcp-server.ts" "package.json"; do
            if ! grep -q "$required" pack-output.txt; then
              echo "::error::Required file missing from tarball: $required"
              exit 1
            fi
          done
          echo "Tarball verified: $FILE_COUNT files, all required entries present"

      - name: Determine npm tag
        if: steps.changed.outputs.should_release == 'true'
        id: tag
        run: |
          VER=${{ steps.local.outputs.version }}
          if echo "$VER" | grep -q -- "-beta"; then
            echo "tag=beta" >> "$GITHUB_OUTPUT"
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          elif echo "$VER" | grep -q -- "-alpha"; then
            echo "tag=alpha" >> "$GITHUB_OUTPUT"
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          elif echo "$VER" | grep -q -- "-rc"; then
            echo "tag=next" >> "$GITHUB_OUTPUT"
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "tag=latest" >> "$GITHUB_OUTPUT"
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npm
        if: steps.changed.outputs.should_release == 'true' && steps.auth_check.outputs.has_token == 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NODE_AUTH_TOKEN }}
        run: |
          # Try OIDC + provenance first. Fall back to plain npm_token publish
          # if provenance isn't configured. If BOTH fail, emit an actionable
          # error instead of burying the 404 under the usual boilerplate.
          if npm publish --provenance --access public --tag ${{ steps.tag.outputs.tag }} 2>&1 | tee publish-attempt-1.log; then
            echo "Published ${{ steps.local.outputs.version }} as @${{ steps.tag.outputs.tag }} (with provenance)"
            exit 0
          fi
          echo "::warning::Provenance publish failed — falling back to plain npm_token publish."
          if npm publish --access public --tag ${{ steps.tag.outputs.tag }} 2>&1 | tee publish-attempt-2.log; then
            echo "Published ${{ steps.local.outputs.version }} as @${{ steps.tag.outputs.tag }} (plain)"
            exit 0
          fi
          echo "::error::Both publish attempts failed. If you see 'E404 Not Found' above, NODE_AUTH_TOKEN is missing/expired/wrong-scoped."
          echo "::error::Regenerate at https://www.npmjs.com/settings/~/tokens/new/automation and update Settings → Environments → npm-publish → NODE_AUTH_TOKEN."
          exit 1

      - name: Summary
        if: steps.changed.outputs.should_release == 'true'
        run: |
          {
            echo "## Release Summary"
            echo ""
            echo "- **Package:** $(node -p "require('./package.json').name")"
            echo "- **Version:** ${{ steps.local.outputs.version }}"
            echo "- **Previous:** ${{ steps.previous.outputs.version }}"
            echo "- **npm tag:** @${{ steps.tag.outputs.tag }}"
            echo "- **Provenance:** enabled"
          } >> "$GITHUB_STEP_SUMMARY"
