name: Auto Merge PRs

on:
  schedule:
    - cron: '*/15 * * * *' # Every 15 minutes
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write
  pull-requests: write

jobs:
  automerge:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Merge pull requests
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Find mergeable PRs that have passed CI
          # We only merge PRs that have no conflicts and are 'clean'
          PR_LIST=$(gh pr list --state open --json number,mergeable,statusCheckRollup --jq '.[] | select(.mergeable == "MERGEABLE" and (.statusCheckRollup // "" | contains("SUCCESS"))) | .number')
          
          if [ -z "$PR_LIST" ]; then
            echo "No mergeable PRs found."
            exit 0
          fi
          
          for PR in $PR_LIST; do
            echo "Merging PR #$PR..."
            gh pr merge "$PR" --squash --delete-branch || echo "Failed to merge PR #$PR"
          done
