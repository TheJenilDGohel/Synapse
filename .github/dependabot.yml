version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "04:00"
      timezone: UTC
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - security
    groups:
      tree-sitter:
        patterns:
          - "tree-sitter-*"
      linting:
        patterns:
          - "eslint*"
          - "prettier*"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "04:30"
      timezone: UTC
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - ci

